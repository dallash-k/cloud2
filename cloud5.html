<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Radwa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #e0f2fe 0%, #f0f9ff 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-x: hidden; color: #1e3a8a; padding: 20px; position: relative;
        }
        .cloud-bg { position: fixed; z-index: -1; opacity: 0.8; filter: blur(1px); }
        .cloud1 { top: 20%; left: 10%; font-size: 8rem; animation: float 15s linear infinite; }
        .cloud2 { top: 40%; right: 15%; font-size: 12rem; animation: float 20s linear infinite reverse; }
        .cloud3 { bottom: 15%; left: 20%; font-size: 10rem; animation: float 18s linear infinite; }
        .cloud4 { top: 15%; right: 25%; font-size: 6rem; animation: float 25s linear infinite reverse; }

        .header { text-align: center; margin-bottom: 30px; z-index: 10; }
        .birthday-title { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .header h1 { font-size: 3.5rem; font-weight: 800; text-shadow: 0 2px 8px rgba(255,255,255,0.8); }
        .cake-emoji { font-size: 2.5rem; animation: pulse 2s infinite; }
        .header p { font-size: 1.5rem; color: #1e40af; margin-top: 10px; }

        .container { width: 100%; max-width: 900px; height: 60vh; position: relative; margin-bottom: 30px; }
        .media-viewport {
            width: 100%; height: 100%; background: rgba(255,255,255,0.4); backdrop-filter: blur(12px);
            border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(30,58,138,0.1);
            border: 1px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        #currentMedia {
            max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0;
            transition: opacity 0.8s ease; border-radius: 10px;
        }
        #currentMedia.loaded { opacity: 1; }

        .nav-btn {
            position: absolute; bottom: 25px; right: 25px; width: 70px; height: 70px;
            border-radius: 50%; background: rgba(255,255,255,0.7); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.8); color: #1e3a8a; font-size: 28px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(30,58,138,0.1);
        }
        .nav-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.9); }

        .loading { position: absolute; font-size: 1.2rem; color: #1e40af; text-align: center; width: 100%; }
        .music-player { width: 100%; max-width: 500px; background: rgba(255,255,255,0.6); backdrop-filter: blur(12px);
            border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(30,58,138,0.1);
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div class="cloud-bg cloud1">☁️</div>
    <div class="cloud-bg cloud2">☁️</div>
    <div class="cloud-bg cloud3">☁️</div>
    <div class="cloud-bg cloud4">☁️</div>

    <div class="header">
        <div class="birthday-title">
            <h1>Happy birthday Radwa</h1>
            <div class="cake-emoji">🎂</div>
        </div>
        <p>(غَيّمة)</p>
    </div>

    <div class="container">
        <div class="media-viewport">
            <div class="loading" id="loading">Loading beautiful clouds...</div>
            <img id="currentMedia" alt="Cloud image">
            <div class="nav-btn" id="nextBtn"><i class="fas fa-cloud"></i></div>
        </div>
    </div>

    <div class="music-player">
        <div class="player-header">
            <h3>Birthday Music</h3>
        </div>
        <div class="player-controls">
            <button class="control-btn play-pause" id="playPauseBtn"><i class="fas fa-play"></i></button>
        </div>
        <div class="now-playing">
            <i class="fas fa-music"></i> <span>Playing: Happy Birthday Music</span>
        </div>
    </div>

    <iframe id="youtubePlayer" width="0" height="0" src="https://www.youtube.com/embed/IYd1-cPwQCk?enablejsapi=1" frameborder="0" allowfullscreen></iframe>

    <script>
        let cloudPosts = [];
        let fallbackImages = [
            "https://i.imgur.com/5z2vK8J.jpg", "https://i.imgur.com/8vL9pQm.jpg", "https://i.imgur.com/JkL3mNx.jpg",
            "https://i.imgur.com/pQvR7sT.jpg", "https://i.imgur.com/XkL9vPq.jpg", "https://i.imgur.com/2mN7vXt.jpg",
            "https://i.imgur.com/9pLqWvR.jpg", "https://i.imgur.com/vL8kPqM.jpg", "https://i.imgur.com/3nBx9vL.jpg",
            "https://i.imgur.com/R7vPqLm.jpg", "https://i.imgur.com/kPqL9vX.jpg", "https://i.imgur.com/mN7vXt2.jpg"
            // Add more if you want
        ];
        let currentMediaElement = document.getElementById('currentMedia');
        let useFallback = false;

        // YouTube Player (simplified)
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtubePlayer', { events: { 'onReady': onPlayerReady } });
        }
        function onPlayerReady() {
            document.getElementById('playPauseBtn').addEventListener('click', () => {
                if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                    player.pauseVideo(); this.innerHTML = '<i class="fas fa-play"></i>';
                } else {
                    player.playVideo(); this.innerHTML = '<i class="fas fa-pause"></i>';
                }
            });
        }
        const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        document.getElementById('nextBtn').addEventListener('click', showRandomCloud);

        async function tryFetchReddit() {
            const proxies = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?', 'https://proxy.corsfix.com/?'];
            const redditUrl = 'https://www.reddit.com/r/CLOUDS/top.json?limit=100&t=month';

            for (let proxy of proxies) {
                try {
                    const res = await fetch(proxy + encodeURIComponent(redditUrl), {
                        headers: { 'User-Agent': 'BirthdayCloudViewer/1.0' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        cloudPosts = data.data.children.filter(p => {
                            const url = p.data.url || '';
                            return /\.(jpg|jpeg|png|gif|webp)$/i.test(url) && !p.data.over_18;
                        });
                        if (cloudPosts.length > 5) return true;
                    }
                } catch(e) {}
            }
            return false;
        }

        async function fetchClouds() {
            const loading = document.getElementById('loading');
            loading.textContent = 'Trying to load clouds...';

            const success = await tryFetchReddit();

            if (success && cloudPosts.length > 0) {
                loading.style.display = 'none';
                showRandomCloud();
            } else {
                useFallback = true;
                loading.style.display = 'none';
                showRandomCloud();
            }
        }

        function showRandomCloud() {
            if (useFallback) {
                const randomUrl = fallbackImages[Math.floor(Math.random() * fallbackImages.length)];
                loadImage(randomUrl);
            } else if (cloudPosts.length > 0) {
                const post = cloudPosts[Math.floor(Math.random() * cloudPosts.length)].data;
                loadImage(post.url);
            }
        }

        function loadImage(url) {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            loading.textContent = 'Loading cloud...';
            currentMediaElement.classList.remove('loaded');

            currentMediaElement.src = url;
            currentMediaElement.onload = () => {
                loading.style.display = 'none';
                currentMediaElement.classList.add('loaded');
            };
            currentMediaElement.onerror = () => {
                loading.textContent = 'Failed, trying another...';
                setTimeout(showRandomCloud, 1000);
            };
        }

        fetchClouds();

        // Auto change every 25 seconds
        setInterval(() => { if (cloudPosts.length > 0 || useFallback) showRandomCloud(); }, 25000);
    </script>
</body>
</html>
